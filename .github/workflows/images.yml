name: Images

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Image tag to publish. Defaults to package.json version.
        required: false
        type: string
      push_latest:
        description: Also update latest tags.
        required: false
        default: true
        type: boolean
      mirror_acr_to_ghcr:
        description: Copy existing ACR application images to GHCR without rebuilding.
        required: false
        default: false
        type: boolean
  push:
    tags:
      - 'v*'

env:
  ACR_REGISTRY: crpi-xm97pbcjrmf5in3s.cn-shanghai.personal.cr.aliyuncs.com
  ACR_NAMESPACE: bailinghub
  GHCR_REGISTRY: ghcr.io
  GHCR_NAMESPACE: bailinghub
  MYSQL_IMAGE_NAME: bailing-mysql
  MYSQL_TAG: '8.4'

jobs:
  publish:
    name: publish application images
    if: ${{ github.event_name != 'workflow_dispatch' || !inputs.mirror_acr_to_ghcr }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v3

      - name: Resolve image tag
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          requested_tag="${{ github.event.inputs.tag || '' }}"
          requested_latest="${{ github.event.inputs.push_latest || '' }}"
          if [ -n "$requested_tag" ]; then
            tag="$requested_tag"
          elif [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" == v* ]]; then
            tag="${GITHUB_REF_NAME#v}"
          else
            tag="$(node -p "require('./package.json').version")"
          fi
          latest="$requested_latest"
          if [ -z "$latest" ]; then latest="true"; fi
          ai_tags="${ACR_REGISTRY}/${ACR_NAMESPACE}/bailinghub:${tag}"$'\n'"${GHCR_REGISTRY}/${GHCR_NAMESPACE}/bailinghub:${tag}"
          demo_tags="${ACR_REGISTRY}/${ACR_NAMESPACE}/bailing-demo-business:${tag}"$'\n'"${GHCR_REGISTRY}/${GHCR_NAMESPACE}/bailing-demo-business:${tag}"
          if [ "$latest" = "true" ]; then
            ai_tags="${ai_tags}"$'\n'"${ACR_REGISTRY}/${ACR_NAMESPACE}/bailinghub:latest"$'\n'"${GHCR_REGISTRY}/${GHCR_NAMESPACE}/bailinghub:latest"
            demo_tags="${demo_tags}"$'\n'"${ACR_REGISTRY}/${ACR_NAMESPACE}/bailing-demo-business:latest"$'\n'"${GHCR_REGISTRY}/${GHCR_NAMESPACE}/bailing-demo-business:latest"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "push_latest=$latest" >> "$GITHUB_OUTPUT"
          {
            echo 'ai_tags<<EOF'
            printf '%s\n' "$ai_tags"
            echo 'EOF'
            echo 'demo_tags<<EOF'
            printf '%s\n' "$demo_tags"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Login to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push bailinghub
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          build-args: |
            NODE_IMAGE=node:22-bookworm-slim
          tags: ${{ steps.meta.outputs.ai_tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.meta.outputs.tag }}
            org.opencontainers.image.licenses=Apache-2.0
            org.opencontainers.image.description=BailingHub Agent control plane

      - name: Build and push bailing-demo-business
        uses: docker/build-push-action@v6
        with:
          context: ./demo/business
          push: true
          platforms: linux/amd64
          build-args: |
            NODE_IMAGE=node:22-bookworm-slim
          tags: ${{ steps.meta.outputs.demo_tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.meta.outputs.tag }}
            org.opencontainers.image.licenses=Apache-2.0
            org.opencontainers.image.description=BailingHub demo business system

  publish-mysql:
    name: sync mysql base image
    if: ${{ github.event_name != 'workflow_dispatch' || !inputs.mirror_acr_to_ghcr }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Login to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Mirror MySQL
        run: |
          BAILING_PUSH_IMAGES=1 \
          BAILING_MYSQL_SOURCE_IMAGE=mysql:${MYSQL_TAG} \
          BAILING_MYSQL_IMAGE_TAG=${MYSQL_TAG} \
          BAILING_MYSQL_IMAGE_NAME=${MYSQL_IMAGE_NAME} \
          sh scripts/publish-mysql-image.sh

  mirror-ghcr:
    name: mirror released images to GHCR
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.mirror_acr_to_ghcr }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v3

      - name: Login to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Copy released application images
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ inputs.tag }}"
          if [ -z "$tag" ]; then
            tag="$(node -p "require('./package.json').version")"
          fi

          copy_image() {
            local source="$1"
            local target="$2"
            docker buildx imagetools create --tag "$target" "$source"
            docker buildx imagetools inspect "$target" >/dev/null
          }

          copy_image \
            "${ACR_REGISTRY}/${ACR_NAMESPACE}/bailinghub:${tag}" \
            "${GHCR_REGISTRY}/${GHCR_NAMESPACE}/bailinghub:${tag}"
          copy_image \
            "${ACR_REGISTRY}/${ACR_NAMESPACE}/bailing-demo-business:${tag}" \
            "${GHCR_REGISTRY}/${GHCR_NAMESPACE}/bailing-demo-business:${tag}"

          if [ "${{ inputs.push_latest }}" = "true" ]; then
            copy_image \
              "${ACR_REGISTRY}/${ACR_NAMESPACE}/bailinghub:${tag}" \
              "${GHCR_REGISTRY}/${GHCR_NAMESPACE}/bailinghub:latest"
            copy_image \
              "${ACR_REGISTRY}/${ACR_NAMESPACE}/bailing-demo-business:${tag}" \
              "${GHCR_REGISTRY}/${GHCR_NAMESPACE}/bailing-demo-business:latest"
          fi
