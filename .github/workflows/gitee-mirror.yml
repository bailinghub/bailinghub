name: Gitee Mirror

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: gitee-mirror
  cancel-in-progress: false

jobs:
  mirror:
    name: sync main and tags
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure Gitee SSH identity
        shell: bash
        env:
          GITEE_MIRROR_SSH_KEY: ${{ secrets.GITEE_MIRROR_SSH_KEY }}
        run: |
          set -euo pipefail
          test -n "$GITEE_MIRROR_SSH_KEY"
          install -d -m 700 "$HOME/.ssh"
          printf '%s\n' "$GITEE_MIRROR_SSH_KEY" > "$HOME/.ssh/bailinghub_gitee_mirror"
          chmod 600 "$HOME/.ssh/bailinghub_gitee_mirror"
          ssh-keyscan -H gitee.com >> "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/known_hosts"
          {
            echo 'Host gitee.com'
            echo '  IdentityFile ~/.ssh/bailinghub_gitee_mirror'
            echo '  IdentitiesOnly yes'
            echo '  StrictHostKeyChecking yes'
            echo '  ConnectTimeout 15'
            echo '  ConnectionAttempts 1'
            echo '  ServerAliveInterval 15'
            echo '  ServerAliveCountMax 2'
          } > "$HOME/.ssh/config"
          chmod 600 "$HOME/.ssh/config"

      - name: Mirror canonical main and release tags
        shell: bash
        run: |
          set -euo pipefail

          push_with_retry() {
            local label="$1"
            shift
            local max_attempts=3
            local attempt=1

            while true; do
              echo "Pushing ${label} to Gitee (attempt ${attempt}/${max_attempts})..."
              if timeout --signal=TERM --kill-after=15s 180s git push "$@"; then
                return 0
              fi

              if (( attempt >= max_attempts )); then
                echo "Failed to push ${label} to Gitee after ${max_attempts} attempts." >&2
                return 1
              fi

              sleep $((attempt * 10))
              attempt=$((attempt + 1))
            done
          }

          git fetch origin --prune --force --tags
          git remote add gitee git@gitee.com:bailinghub/bailinghub.git
          push_with_retry main --force gitee refs/remotes/origin/main:refs/heads/main
          push_with_retry 'release tags' --force gitee --tags
