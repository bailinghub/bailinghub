# 持续集成：每次 push / PR 跑核心类型检查、单元测试、安全扫描、控制台构建/E2E、SDK 契约和 Docker demo。
# 设计与项目「近零依赖」一致：核心单测用 Node 内置 test runner，SDK 契约不依赖外部服务。
name: CI

on:
  push:
  pull_request:

jobs:
  check:
    name: typecheck + unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  web-admin:
    name: console build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web-admin/package-lock.json
      - run: npm ci
        working-directory: web-admin
      - run: npm run build
        working-directory: web-admin

  security:
    name: security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run release:audit
      - run: npm audit --audit-level=low

  github-boundary:
    name: GitHub repository rehearsal
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run github:verify

  console-e2e:
    name: console e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            web-admin/package-lock.json
      - run: npm ci
      - run: npm ci
        working-directory: web-admin
      - run: npm run build
        working-directory: web-admin
      - run: npm audit --audit-level=low
        working-directory: web-admin
      - run: npx playwright install --with-deps chromium
      - run: npm run e2e:console

  sdk-contract:
    name: SDK contract tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - run: npm ci
      - run: npm run sdk:test
      - run: npm run sdk:test7
      - run: npm run sdk:test-node
      - run: npm run sdk:test-python
      - run: npm run sdk:test-runtime
      - run: npm run sdk:test-p1

  docker-demo:
    name: Docker demo e2e
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - run: docker compose up -d --build --wait
      - run: docker compose exec -T bailinghub npm run smoke
      - run: docker compose exec -T bailinghub npm run demo:e2e
      - name: docker logs
        if: always()
        run: docker compose logs --no-color --tail=200
      - name: docker down
        if: always()
        run: docker compose down -v
