services:
  mysql:
    image: ${BAILING_MYSQL_IMAGE:-crpi-xm97pbcjrmf5in3s.cn-shanghai.personal.cr.aliyuncs.com/bailinghub/bailing-mysql:8.4}
    command: ["mysqld", "--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci"]
    environment:
      MYSQL_ROOT_PASSWORD: ${BAILING_DEMO_MYSQL_ROOT_PASSWORD:-bailing-root-pass}
      MYSQL_DATABASE: ${BAILING_DEMO_MYSQL_DATABASE:-bailinghub}
      MYSQL_USER: ${BAILING_DEMO_MYSQL_USER:-bailing}
      MYSQL_PASSWORD: ${BAILING_DEMO_MYSQL_PASSWORD:-bailing-pass}
    ports:
      - "${BAILING_MYSQL_PUBLIC_PORT:-3307}:3306"
    volumes:
      - bailing-mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 5s
      timeout: 3s
      retries: 30

  demo-business:
    image: ${BAILING_DEMO_BUSINESS_IMAGE:-crpi-xm97pbcjrmf5in3s.cn-shanghai.personal.cr.aliyuncs.com/bailinghub/bailing-demo-business:0.1.9}
    environment:
      DEMO_HOST: 0.0.0.0
      DEMO_PORT: 19080
      DEMO_TOOL_SECRET: ${DEMO_TOOL_SECRET:-demo-tool-secret-change-me}
      DEMO_CLIENT_TOKEN: ${DEMO_CLIENT_TOKEN:-bailing-demo-client-token}
      DEMO_HUB_URL: http://bailinghub:18900
    ports:
      - "${BAILING_DEMO_PUBLIC_PORT:-19080}:19080"

  bailinghub:
    image: ${BAILINGHUB_IMAGE:-crpi-xm97pbcjrmf5in3s.cn-shanghai.personal.cr.aliyuncs.com/bailinghub/bailinghub:0.1.9}
    depends_on:
      mysql:
        condition: service_healthy
      demo-business:
        condition: service_started
    environment:
      BAILING_ENV: production
      BAILING_HOST: 0.0.0.0
      BAILING_PORT: 18900
      BAILING_TOKEN: ${BAILING_TOKEN:-}
      BAILING_STATE_BACKEND: mysql
      BAILING_MYSQL_HOST: mysql
      BAILING_MYSQL_PORT: 3306
      BAILING_MYSQL_DATABASE: ${BAILING_DEMO_MYSQL_DATABASE:-bailinghub}
      BAILING_MYSQL_USER: ${BAILING_DEMO_MYSQL_USER:-bailing}
      BAILING_MYSQL_PASSWORD: ${BAILING_DEMO_MYSQL_PASSWORD:-bailing-pass}
      BAILING_BOOTSTRAP_ADMIN_USERNAME: ${BAILING_BOOTSTRAP_ADMIN_USERNAME:-}
      BAILING_BOOTSTRAP_ADMIN_PASSWORD: ${BAILING_BOOTSTRAP_ADMIN_PASSWORD:-}
      BAILING_METRICS_ENABLED: ${BAILING_METRICS_ENABLED:-false}
      BAILING_METRICS_TOKEN: ${BAILING_METRICS_TOKEN:-}
      BAILING_METRICS_SCRAPE_TIMEOUT_MS: ${BAILING_METRICS_SCRAPE_TIMEOUT_MS:-5000}
      BAILING_ALERTS_TYPE: ""
      BAILING_SEED_DEMO: "1"
      BAILING_DEMO_ADMIN_PASSWORD: ${BAILING_DEMO_ADMIN_PASSWORD:-bailing-demo-admin}
      BAILING_SMOKE_URL: http://127.0.0.1:18900
      DEMO_BUSINESS_URL: http://demo-business:19080
      DEMO_TOOL_SECRET: ${DEMO_TOOL_SECRET:-demo-tool-secret-change-me}
      DEMO_CLIENT_TOKEN: ${DEMO_CLIENT_TOKEN:-bailing-demo-client-token}
    ports:
      - "${BAILING_PUBLIC_PORT:-18900}:18900"

volumes:
  bailing-mysql:
